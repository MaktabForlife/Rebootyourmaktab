<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maktab4Life</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>

  <!-- Splash Screen -->
  <div id="splashScreen" class="splash-screen">
    <div class="splash-card">
      <img src="/logo.png" alt="Maktab4Life Logo" class="splash-logo" />
      <div class="splash-loading-text">Loading...</div>
    </div>
  </div>

  <!-- Main App -->
  <main class="app-shell">
    <section class="screen active">
      <img src="/logo.png" alt="Maktab4Life Logo" class="app-logo" />
      <h1>Maktab4Life</h1>
      <p class="subtitle">Please use your personal student or admin link.</p>
    </section>
  </main>

  <script>
    window.addEventListener("load", function () {
      setTimeout(function () {
        const splash = document.getElementById("splashScreen");

        if (splash) {
          splash.classList.add("splash-hidden");

          setTimeout(function () {
            splash.remove();
          }, 400);
        }
      }, 900);
    });
  </script>

</body>
</html>
