<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Maktab4Life Recorder</title>
  <link rel="stylesheet" href="./recorder.css?v=1.3" />
</head>
<body>
  <main class="recorder-shell">
    <header class="recorder-header">
      <div class="recorder-header-text">
        <p class="eyebrow">MAKTAB4LIFE RECORDER</p>
        <h1 id="recorder-context-title">Select a page</h1>
      </div>
      <button id="page-pill" class="page-action-pill" type="button" aria-label="Go to page selection">Page ›</button>
      <div id="status-pill" class="visually-hidden" aria-live="polite">Ready</div>
    </header>

    <section id="page-select-screen" class="recorder-screen active" aria-labelledby="recorder-context-title">
      <div class="image-selector-card">
        <button id="image-selector-btn" class="image-selector-btn" type="button" aria-haspopup="dialog" aria-controls="image-picker-sheet">
          <span class="image-selector-kicker">Image Selector</span>
          <span id="image-selector-current" class="image-selector-current">Loading images...</span>
          <span class="image-selector-chevron" aria-hidden="true">⌄</span>
        </button>
        <input id="page-upload" class="visually-hidden" type="file" accept="image/*" multiple />
      </div>

      <div id="page-empty-state" class="empty-state">
        <p>No pages loaded yet.</p>
        <p class="muted">Choose an image set, or select your own image.</p>
      </div>

      <div id="page-grid" class="page-grid" aria-label="Available reader pages"></div>
    </section>

    <section id="record-screen" class="recorder-screen record-screen" aria-labelledby="recorder-context-title">
      <p id="selected-page-label" class="visually-hidden">Selected page</p>

      <div class="reader-frame">
        <canvas id="reader-canvas" aria-label="Selected reader page"></canvas>
      </div>

      <div class="record-controls" aria-label="Recording controls">
        <div class="control-row">
          <button id="record-btn" class="record-icon-action" type="button" aria-label="Start recording">
            <img class="record-control-icon" src="./record.svg" alt="" aria-hidden="true" />
            <span class="record-action-label">RECORD</span>
          </button>
          <button id="stop-btn" class="record-icon-action hidden" type="button" aria-label="Stop recording">
            <img class="record-control-icon" src="./stoprecord.svg" alt="" aria-hidden="true" />
            <span class="record-action-meta">RECORDING : Time remaining <output id="countdown-timer" aria-live="polite">02:00</output></span>
          </button>
        </div>
        <p id="record-helper" class="record-helper">Microphone permission will be requested when you tap Record.</p>
      </div>
    </section>

    <section id="preview-screen" class="recorder-screen preview-screen" aria-labelledby="recorder-context-title">
      <p id="recording-meta" class="visually-hidden">Review before sharing.</p>

      <video id="preview-video" class="preview-video" controls playsinline></video>

      <div class="preview-actions" aria-label="Recording actions">
        <button id="rerecord-btn" class="preview-icon-action" type="button">
          <img src="./cancelredo.svg" alt="" aria-hidden="true" />
          <span>Redo</span>
        </button>
        <button id="share-btn" class="preview-icon-action" type="button">
          <img src="./share.svg" alt="" aria-hidden="true" />
          <span>Share</span>
        </button>
        <a id="download-link" class="preview-icon-action download-link" href="#" download>
          <img src="./download.svg" alt="" aria-hidden="true" />
          <span>Download</span>
        </a>
      </div>
    </section>
  </main>

  <div id="image-picker-sheet" class="picker-sheet hidden" role="dialog" aria-modal="true" aria-labelledby="image-picker-title">
    <button id="image-picker-backdrop" class="picker-backdrop" type="button" aria-label="Close image selector"></button>
    <div class="picker-panel">
      <div class="picker-handle" aria-hidden="true"></div>
      <div class="picker-header-row">
        <h2 id="image-picker-title">Image Selector</h2>
        <button id="image-picker-close" class="picker-close-btn" type="button" aria-label="Close image selector">×</button>
      </div>
      <div id="image-picker-options" class="picker-options" role="listbox" aria-label="Image sets"></div>
    </div>
  </div>

  <script src="./recorder.js?v=1.3"></script>
</body>
</html>
